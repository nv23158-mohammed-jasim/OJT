          type: string
        email:
          type: string
        role:
          type: string
          enum: [student, teacher, admin]
        studentId:
          type: ["string", "null"]
        department:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    UserInput:
