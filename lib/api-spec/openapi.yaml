        inviterName:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        acceptedAt:
          type: ["string", "null"]
          format: date-time

    InvitationInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
